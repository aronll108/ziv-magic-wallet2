<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>比卡超魔法錢包 - Ziv 4歲生日快樂</title>

    <!-- 穩定 CDN 連結 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { margin: 0; background-color: #1a1a2e; font-family: 'Inter', sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 1.5rem; }
        .glow-gold { box-shadow: 0 0 20px rgba(250, 204, 21, 0.3); }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; position: relative; width: 100%; height: 100%; }
        .is-flipped { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .front { transform: rotateY(180deg); }
        /* 簡單動畫 */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .float-anim { animation: float 3s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root">
        <!-- 初始 Loading 提示 -->
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a2e; color: #666;">
            載入魔法世界中...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        console.log("🚀 [System] 魔法錢包程式正在啟動...");

        // --- 穩定圖片資源 ---
        const PIKACHU_IMG = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png";
        const POKEBALL_IMG = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png";
        const GREATBALL_IMG = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/great-ball.png";
        const ULTRABALL_IMG = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/ultra-ball.png";
        const CAKE_IMG = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/rare-candy.png";
        const STORAGE_KEY = 'ziv_magic_wallet_v2';

        // 圖片報錯處理：如果圖片讀取失敗，顯示一個黃色圓圈
        const ImgWithFallback = ({ src, alt, className, style }) => {
            const [error, setError] = useState(false);
            if (error) {
                return <div className={`flex items-center justify-center bg-yellow-400 rounded-full ${className}`} style={style}><span className="text-[10px]">Pika</span></div>;
            }
            return <img src={src} alt={alt} className={className} style={style} referrerPolicy="no-referrer" onError={() => { console.log(`⚠️ [Image] 載入失敗: ${src}`); setError(true); }} />;
        };

        const COUPON_DATA = [
            { id: 1, color: 'bg-[#f8e3a1]', text: 'text-[#8b6508]', icon: '⚡' },
            { id: 2, color: 'bg-[#c1e1c1]', text: 'text-[#1b5e20]', icon: '⚽' },
            { id: 3, color: 'bg-[#c1d3e1]', text: 'text-[#0d47a1]', icon: '🚗' },
            { id: 4, color: 'bg-[#c1e1dc]', text: 'text-[#006064]', icon: '✈️' },
            { id: 5, color: 'bg-[#e1c1c1]', text: 'text-[#b71c1c]', icon: '🍰' },
            { id: 6, color: 'bg-[#d1c1e1]', text: 'text-[#4a148c]', icon: '🏀' },
            { id: 7, color: 'bg-[#f1d1c1]', text: 'text-[#e65100]', icon: '🐱' },
            { id: 8, color: 'bg-[#f1c1d1]', text: 'text-[#880e4f]', icon: '👑' },
            { id: 9, color: 'bg-[#d9c8b3]', text: 'text-[#3e2723]', icon: '🏆' },
            { id: 10, color: 'bg-[#d1d1d1]', text: 'text-[#212121]', icon: '🏁' },
        ];

        function App() {
            const [gameState, setGameState] = useState('GIFT');
            const [saveData, setSaveData] = useState({ earned: 0, spent: 0, levelsCleared: {} });

            // 讀取存檔
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    console.log("💾 [Storage] 讀取存檔成功:", parsed);
                    setSaveData(parsed);
                }
            }, []);

            // 儲存存檔
            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));
            }, [saveData]);

            // 獎勵機制
            const addOneCoupon = useCallback(() => {
                console.log("✨ [Game] 獲得一張魔法券!");
                setSaveData(prev => ({
                    ...prev,
                    earned: Math.min(10, prev.earned + 1)
                }));
                confetti({
                    particleCount: 80,
                    spread: 60,
                    origin: { y: 0.7 },
                    colors: ['#facc15', '#ef4444', '#ffffff']
                });
            }, []);

            const redeemCoupon = () => {
                if (saveData.earned - saveData.spent > 0) {
                    console.log("🎟️ [Wallet] 兌換成功!");
                    setSaveData(prev => {
                        const newSpent = prev.spent + 1;
                        if (newSpent >= 10) setTimeout(() => setGameState('FINAL'), 1000);
                        return { ...prev, spent: newSpent };
                    });
                    confetti({ particleCount: 150, zIndex: 1000 });
                }
            };

            const changeState = (s) => {
                console.log(`📍 [Nav] 切換至頁面: ${s}`);
                setGameState(s);
            };

            // 根據 gameState 渲染組件
            const renderContent = () => {
                switch(gameState) {
                    case 'GIFT': return <GiftIntro onOpen={() => changeState('MAP')} />;
                    case 'MAP': return <GameMap saveData={saveData} onSelect={changeState} onOpenWallet={() => changeState('WALLET')} />;
                    case 'LEVEL1': return <Level1Reaction onBack={() => changeState('MAP')} onEarn={addOneCoupon} onWin={() => {
                        setSaveData(p => ({...p, levelsCleared: {...p.levelsCleared, 1: true}}));
                        changeState('MAP');
                    }} />;
                    case 'LEVEL2': return <Level2Memory onBack={() => changeState('MAP')} onEarn={addOneCoupon} onWin={() => {
                        setSaveData(p => ({...p, levelsCleared: {...p.levelsCleared, 2: true}}));
                        changeState('MAP');
                    }} />;
                    case 'LEVEL3': return <Level3Eye onBack={() => changeState('MAP')} onEarn={addOneCoupon} onWin={() => {
                        setSaveData(p => ({...p, levelsCleared: {...p.levelsCleared, 3: true}}));
                        changeState('MAP');
                    }} />;
                    case 'WALLET': return <WalletView saveData={saveData} onBack={() => changeState('MAP')} onRedeem={redeemCoupon} />;
                    case 'FINAL': return <FinalView />;
                    default: return <GiftIntro onOpen={() => changeState('MAP')} />;
                }
            };

            return (
                <div className="min-h-screen bg-[#1a1a2e] bg-gradient-to-br from-[#1a1a2e] via-[#16213e] to-[#0f3460] overflow-hidden select-none">
                    {renderContent()}
                </div>
            );
        }

        // --- 組件: 開場禮物盒 ---
        function GiftIntro({ onOpen }) {
            return (
                <div className="fixed inset-0 flex flex-col items-center justify-center p-6 bg-black/60 backdrop-blur-xl z-50">
                    <div className="float-anim cursor-pointer group" onClick={onOpen}>
                        <div className="w-56 h-56 bg-red-600 rounded-2xl border-4 border-white shadow-[0_0_50px_rgba(255,0,0,0.5)] flex items-center justify-center relative active:scale-95 transition-transform overflow-hidden">
                            <div className="absolute inset-0 bg-yellow-400 w-8 mx-auto border-x-2 border-white"></div>
                            <div className="absolute inset-x-0 h-8 my-auto bg-yellow-400 border-y-2 border-white"></div>
                            <span className="text-7xl drop-shadow-lg relative z-10">🎁</span>
                        </div>
                    </div>
                    <h1 className="mt-10 text-4xl font-black text-center italic tracking-tighter text-white">契仔 Ziv<br/><span className="text-yellow-400 text-3xl">4 歲生日快樂!</span></h1>
                    <p className="mt-4 text-white/60 font-bold uppercase tracking-[0.2em] text-sm">點擊打開魔法驚喜</p>
                </div>
            );
        }

        // --- 組件: 遊戲地圖 ---
        function GameMap({ saveData, onSelect, onOpenWallet }) {
            const levels = [
                { id: 'LEVEL1', title: '反應挑戰', icon: '⚡', color: 'border-yellow-400' },
                { id: 'LEVEL2', title: '記憶挑戰', icon: '🧠', color: 'border-blue-400' },
                { id: 'LEVEL3', title: '森林尋寶', icon: '🔍', color: 'border-green-400' }
            ];
            const available = saveData.earned - saveData.spent;
            return (
                <div className="p-6 pt-20 max-w-lg mx-auto flex flex-col h-screen">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-10 glass p-5 glow-gold">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-yellow-400 rounded-full flex items-center justify-center overflow-hidden border-2 border-white shadow-md">
                                <ImgWithFallback src={PIKACHU_IMG} className="w-10 h-10" />
                            </div>
                            <div>
                                <h2 className="text-xl font-black italic tracking-tighter">比卡超錢包</h2>
                                <p className="text-[10px] text-yellow-400 font-bold uppercase">Magic Collector</p>
                            </div>
                        </div>
                        <div onClick={onOpenWallet} className="cursor-pointer text-right bg-white/5 px-4 py-2 rounded-xl">
                            <p className="text-2xl font-black text-yellow-400 leading-none">{available}</p>
                            <p className="text-[8px] uppercase font-bold opacity-50">可用卡券</p>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col gap-5 justify-center">
                        {levels.map((lvl, i) => {
                            const isCleared = saveData.levelsCleared[i+1];
                            return (
                                <div key={lvl.id} onClick={() => !isCleared && onSelect(lvl.id)} className={`glass p-6 flex items-center gap-6 cursor-pointer transform active:scale-95 transition-all ${isCleared ? 'opacity-40 grayscale pointer-events-none' : `hover:bg-white/20 border-l-8 ${lvl.color}`}`}>
                                    <span className="text-4xl">{lvl.icon}</span>
                                    <div>
                                        <h3 className="text-xl font-black italic uppercase">關卡 {i+1}</h3>
                                        <p className="text-xs text-blue-300 font-bold tracking-widest">{lvl.title}</p>
                                    </div>
                                    <div className="ml-auto text-2xl">{isCleared ? '✅' : '▶️'}</div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-auto mb-6 text-center">
                        <button onClick={onOpenWallet} className="w-full py-4 glass bg-yellow-400 text-black font-black uppercase italic tracking-widest shadow-xl">進入錢包兌換獎勵</button>
                    </div>
                </div>
            );
        }

        // --- 組件: 關卡 1 (反應) ---
        function Level1Reaction({ onBack, onWin, onEarn }) {
            const [score, setScore] = useState(0);
            const [active, setActive] = useState(null);
            const [earnedInLevel, setEarnedInLevel] = useState(0);

            useEffect(() => {
                let timer;
                const spawn = () => {
                    setActive(Math.floor(Math.random() * 4));
                    timer = setTimeout(() => {
                        setActive(null);
                        timer = setTimeout(spawn, Math.random() * 1000 + 400);
                    }, 1000);
                };
                spawn();
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                const thresholds = [5, 10, 15];
                if (score > 0 && thresholds.includes(score) && earnedInLevel < thresholds.indexOf(score) + 1) {
                    onEarn();
                    setEarnedInLevel(p => p + 1);
                }
                if (score >= 15) setTimeout(onWin, 500);
            }, [score]);

            return (
                <div className="fixed inset-0 p-6 flex flex-col bg-[#16213e] z-40">
                    <div className="text-center mt-12 mb-8">
                        <h2 className="text-4xl font-black italic mb-2 tracking-tighter">反應挑戰</h2>
                        <p className="text-blue-300 text-[10px] font-bold uppercase mb-4 tracking-widest">每拿 5 分獲獎 (拿足 15 分過關)</p>
                        <div className="glass inline-block px-10 py-3 text-yellow-400 font-black text-3xl glow-gold leading-none">SCORE: {score}</div>
                    </div>
                    <div className="grid grid-cols-2 gap-8 w-full max-w-xs mx-auto flex-1 content-center">
                        {[0,1,2,3].map(i => (
                            <div key={i} className="relative h-28 flex items-center justify-center">
                                <ImgWithFallback src={POKEBALL_IMG} className="w-16 opacity-10 grayscale" />
                                {active === i && (
                                    <div key={i} onClick={() => { setScore(s => s + 1); setActive(null); }} className="absolute cursor-pointer flex items-center justify-center">
                                         <ImgWithFallback src={PIKACHU_IMG} className="w-24 drop-shadow-2xl animate-bounce" />
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                    <button onClick={onBack} className="mb-10 text-white/40 font-bold text-xs uppercase self-center p-4">← 退出</button>
                </div>
            );
        }

        // --- 組件: 關卡 2 (記憶) ---
        function Level2Memory({ onBack, onWin, onEarn }) {
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [earnedInLevel, setEarnedInLevel] = useState(0);

            useEffect(() => {
                const images = [PIKACHU_IMG, POKEBALL_IMG, GREATBALL_IMG, ULTRABALL_IMG, CAKE_IMG, "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/star-piece.png"];
                const fullCards = [...images, ...images].sort(() => Math.random() - 0.5).map((img, i) => ({ id: i, img }));
                setCards(fullCards);
            }, []);

            useEffect(() => {
                if (flipped.length === 2) {
                    const [a, b] = flipped;
                    if (cards[a].img === cards[b].img) {
                        setSolved(p => {
                            const newSolved = [...p, a, b];
                            const pairs = newSolved.length / 2;
                            if (pairs % 2 === 0 && pairs <= 6 && earnedInLevel < pairs / 2) {
                                onEarn();
                                setEarnedInLevel(prev => prev + 1);
                            }
                            if (newSolved.length === 12) setTimeout(onWin, 1000);
                            return newSolved;
                        });
                        setFlipped([]);
                    } else {
                        setTimeout(() => setFlipped([]), 1000);
                    }
                }
            }, [flipped, cards]);

            return (
                <div className="fixed inset-0 p-6 flex flex-col bg-[#16213e] z-40 overflow-y-auto">
                    <div className="text-center mt-12 mb-8">
                        <h2 className="text-4xl font-black italic mb-2 tracking-tighter">記憶大挑戰</h2>
                        <p className="text-blue-300 text-[10px] font-bold uppercase tracking-widest">每成功配對 2 對可獲一張券</p>
                    </div>
                    <div className="grid grid-cols-3 gap-3 w-full max-w-sm mx-auto mb-8">
                        {cards.map((card, i) => {
                            const isFlipped = flipped.includes(i) || solved.includes(i);
                            return (
                                <div key={i} className="aspect-square relative perspective-1000" onClick={() => !isFlipped && flipped.length < 2 && setFlipped(p => [...p, i])}>
                                    <div className={`card-inner ${isFlipped ? 'is-flipped' : ''}`}>
                                        <div className="backface-hidden glass flex items-center justify-center p-2 bg-white/5 border-2 border-white/10 rounded-xl">
                                            <ImgWithFallback src={POKEBALL_IMG} className="w-8 opacity-40" />
                                        </div>
                                        <div className="backface-hidden front glass flex items-center justify-center p-2 bg-white/20 border-2 border-yellow-400 rounded-xl">
                                            <ImgWithFallback src={card.img} className="w-full h-full object-contain" />
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    <button onClick={onBack} className="mb-10 text-white/40 font-bold text-xs uppercase self-center p-4">← 退出</button>
                </div>
            );
        }

        // --- 組件: 關卡 3 (尋寶) ---
        function Level3Eye({ onBack, onWin, onEarn }) {
            const [found, setFound] = useState([]);
            const crowd = useMemo(() => Array.from({length: 40}).map((_, i) => ({
                id: i, x: Math.random() * 90 + 5, y: Math.random() * 90 + 5,
                img: Math.random() > 0.5 ? PIKACHU_IMG : POKEBALL_IMG,
                rotate: Math.random() * 360, scale: 0.3 + Math.random() * 0.4
            })), []);
            const targets = useMemo(() => [
                {id: 0, x: 15, y: 75}, {id: 1, x: 85, y: 25}, {id: 2, x: 55, y: 45}, {id: 3, x: 25, y: 35}
            ], []);

            const handleClick = (id) => {
                if (!found.includes(id)) {
                    setFound(p => {
                        const next = [...p, id];
                        onEarn();
                        if (next.length === 4) setTimeout(onWin, 1000);
                        return next;
                    });
                }
            };

            return (
                <div className="fixed inset-0 p-6 flex flex-col bg-[#16213e] z-40">
                    <div className="text-center mt-12 mb-6">
                        <h2 className="text-3xl font-black italic tracking-tighter">森林尋寶 ({found.length}/4)</h2>
                        <div className="flex items-center justify-center gap-3 mt-4 glass p-3 border-white/10 w-fit mx-auto">
                            <span className="text-[10px] font-black opacity-60">目標:</span>
                            <ImgWithFallback src={ULTRABALL_IMG} className="w-8 h-8 drop-shadow-[0_0_10px_gold]" />
                            <span className="text-xs font-black text-yellow-400">閃閃球</span>
                        </div>
                    </div>
                    <div className="flex-1 glass bg-black/30 relative overflow-hidden rounded-[2rem] border-4 border-white/20">
                        {crowd.map(c => (
                            <div key={c.id} style={{ left: `${c.x}%`, top: `${c.y}%`, transform: `rotate(${c.rotate}deg) scale(${c.scale})` }} className="absolute w-20 opacity-80 pointer-events-none">
                                <ImgWithFallback src={c.img} className="w-full" />
                            </div>
                        ))}
                        {targets.map(t => (
                            <div key={t.id} onClick={() => handleClick(t.id)} style={{ left: `${t.x}%`, top: `${t.y}%` }} className={`absolute w-12 -translate-x-1/2 -translate-y-1/2 cursor-pointer z-20 ${found.includes(t.id) ? 'opacity-20 scale-150' : 'opacity-100 scale-100'}`}>
                                <ImgWithFallback src={ULTRABALL_IMG} className="w-full drop-shadow-xl" />
                            </div>
                        ))}
                    </div>
                    <button onClick={onBack} className="my-6 text-white/40 font-bold text-xs uppercase self-center">← 退出</button>
                </div>
            );
        }

        // --- 組件: 錢包收藏夾 ---
        function WalletView({ saveData, onBack, onRedeem }) {
            const available = saveData.earned - saveData.spent;
            return (
                <div className="p-6 pt-16 h-screen flex flex-col overflow-y-auto w-full max-w-lg mx-auto bg-[#1a1a2e]">
                    <button onClick={onBack} className="p-4 text-white/40 font-bold text-xs uppercase self-start">← 返回</button>
                    <h1 className="text-4xl font-black italic mb-8 tracking-tighter">魔法券收藏夾</h1>
                    
                    <div className="grid grid-cols-2 gap-4 mb-24 pb-10">
                        {COUPON_DATA.map((data, i) => {
                            const isUnlocked = saveData.earned > i;
                            const isSpent = saveData.spent > i;
                            return (
                                <div key={i} className={`relative aspect-[16/9] p-3 rounded-lg overflow-hidden flex flex-col items-center justify-center border transition-all duration-700 ${isUnlocked ? `${data.color} border-white/30 shadow-lg scale-100` : 'bg-gray-800 border-white/10 opacity-30 scale-90 grayscale'} ${isSpent ? 'opacity-50 blur-[0.5px]' : ''}`}>
                                    <div className={`absolute top-1 left-1 border border-current rounded-full w-4 h-4 flex items-center justify-center font-black text-[6px] ${data.text}`}>88</div>
                                    <div className="flex w-full items-center justify-between gap-1 overflow-hidden px-1">
                                         <div className="w-1/3 flex justify-center"><ImgWithFallback src={PIKACHU_IMG} className="w-10" /></div>
                                         <div className={`flex-1 text-center select-none ${data.text}`}>
                                             <p className="text-[4px] font-black uppercase leading-tight">To Ziv</p>
                                             <p className="text-xl font-black leading-none my-0.5">$88</p>
                                             <p className="text-[4px] font-bold italic scale-75 leading-none">From 謙</p>
                                         </div>
                                         <div className={`w-1/4 opacity-30 text-center ${data.text} text-xl`}>{data.icon}</div>
                                    </div>
                                    {!isUnlocked && <div className="absolute inset-0 flex items-center justify-center bg-black/10"><span className="text-3xl">🔒</span></div>}
                                    {isSpent && <div className="absolute inset-0 flex items-center justify-center p-2"><div className="border-4 border-red-600/60 text-red-600/60 font-black px-4 rotate-12 text-sm uppercase bg-white/5 backdrop-blur-sm">已兌換</div></div>}
                                </div>
                            );
                        })}
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-white/10 backdrop-blur-3xl z-30">
                        <div className="max-w-lg mx-auto">
                            <p className="text-yellow-400 font-black uppercase text-center text-xs tracking-[0.2em] mb-3">你還有 {available} 張可以使用!</p>
                            <button onClick={onRedeem} className={`w-full py-4 rounded-full font-black uppercase text-xl shadow-2xl transition-all active:scale-95 ${available > 0 ? 'bg-yellow-400 text-black glow-gold opacity-100' : 'bg-white/10 text-white/20'}`}>
                                {available > 0 ? '領取禮物吧' : '挑戰關卡贏卡券'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 組件: 最終驚喜 ---
        function FinalView() {
            useEffect(() => {
                console.log("🏆 [Game] 任務圓滿達成，祝 Ziv 生日快樂!");
                confetti({ particleCount: 300, spread: 200, origin: { y: 0.5 } });
            }, []);
            return (
                <div className="fixed inset-0 flex flex-col items-center justify-center p-10 bg-black z-[100] text-center">
                    <img src={CAKE_IMG} className="w-64 float-anim mb-10 drop-shadow-[0_0_50px_rgba(255,255,255,0.4)]" />

                    <p className="text-xl font-bold text-white/80 max-w-sm mb-10">Ziv, 你成功收集了 10 張魔法券! 這是給你的 4 歲生日最強獎勵!</p>
                    <button onClick={() => window.location.reload()} className="px-8 py-3 glass bg-white/10 border-white/20 text-white font-bold rounded-full">重新開始</button>
                </div>
            );
        }

        // 啟動渲染
        console.log("✅ [System] React 載入完成，掛載 root 節點...");
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
